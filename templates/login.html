<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <style>

        body{
            font-family:Arial;
            background:#111827;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            width:300px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background:#2563eb;
            color:white;
            border:none;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Welcome Back</h2>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <a href="/register">
        Create Account
    </a>

</div>

</body>
</html>
